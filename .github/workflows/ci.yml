    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Gen Version
      id: gen-version
      run: echo "VERSION=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.STAPACR_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build Image
      run: |
        docker build \
          -t ${{ secrets.STAPACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.gen-version.outputs.VERSION }} \
          -f Dockerfile-maven .

    - name: Push Image
      run: |
        docker push ${{ secrets.STAPACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.gen-version.outputs.VERSION }}
